apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      containers:
        - name: platform-api
          image: <ECR_URI>/platform-api:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: platform-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001







