apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime-core
  template:
    metadata:
      labels:
        app: realtime-core
    spec:
      containers:
        - name: realtime-core
          image: <ECR_URI>/realtime-core:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: realtime-core-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000







