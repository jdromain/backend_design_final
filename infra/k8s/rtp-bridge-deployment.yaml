apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtp-bridge
  namespace: rezovo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rtp-bridge
  template:
    metadata:
      labels:
        app: rtp-bridge
    spec:
      containers:
      - name: rtp-bridge
        image: rezovo/rtp-bridge:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8081
          name: websocket
        - containerPort: 9090
          name: metrics
        env:
        - name: HTTP_PORT
          value: "8080"
        - name: WS_PORT
          value: "8081"
        - name: METRICS_PORT
          value: "9090"
        - name: SIP_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: rtp-bridge-config
              key: sip_domain
        - name: RTP_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: rtp-bridge-secret
              key: auth_token
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rtp-bridge
  namespace: rezovo
spec:
  type: LoadBalancer
  selector:
    app: rtp-bridge
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: websocket
    port: 8081
    targetPort: 8081
  - name: metrics
    port: 9090
    targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rtp-bridge-config
  namespace: rezovo
data:
  sip_domain: "sip.rezovo.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: rtp-bridge-secret
  namespace: rezovo
type: Opaque
stringData:
  auth_token: "change-me-in-production"







