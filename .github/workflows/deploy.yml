name: Deploy to AWS

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint --if-present
      
      - name: Run tests
        run: npm test --if-present
      
      - name: Build packages
        run: npm run build --workspace=packages --if-present

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GithubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set environment suffix
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "suffix=prod" >> $GITHUB_OUTPUT
          else
            echo "suffix=staging" >> $GITHUB_OUTPUT
          fi
      
      - name: Build and push platform-api
        run: |
          docker build -f apps/platform-api/Dockerfile -t $ECR_REGISTRY/rezovo/platform-api:${{ github.sha }} -t $ECR_REGISTRY/rezovo/platform-api:latest .
          docker push $ECR_REGISTRY/rezovo/platform-api:${{ github.sha }}
          docker push $ECR_REGISTRY/rezovo/platform-api:latest
      
      - name: Build and push realtime-core (Node)
        run: |
          docker build -f apps/realtime-core/Dockerfile.node -t $ECR_REGISTRY/rezovo/realtime-core-node:${{ github.sha }} -t $ECR_REGISTRY/rezovo/realtime-core-node:latest .
          docker push $ECR_REGISTRY/rezovo/realtime-core-node:${{ github.sha }}
          docker push $ECR_REGISTRY/rezovo/realtime-core-node:latest
      
      - name: Build and push realtime-core (RTP)
        run: |
          docker build -f apps/realtime-core/Dockerfile.rtp -t $ECR_REGISTRY/rezovo/realtime-core-rtp:${{ github.sha }} -t $ECR_REGISTRY/rezovo/realtime-core-rtp:latest .
          docker push $ECR_REGISTRY/rezovo/realtime-core-rtp:${{ github.sha }}
          docker push $ECR_REGISTRY/rezovo/realtime-core-rtp:latest
      
      - name: Build and push jobs worker
        run: |
          docker build -f apps/jobs/Dockerfile -t $ECR_REGISTRY/rezovo/jobs:${{ github.sha }} -t $ECR_REGISTRY/rezovo/jobs:latest .
          docker push $ECR_REGISTRY/rezovo/jobs:${{ github.sha }}
          docker push $ECR_REGISTRY/rezovo/jobs:latest
      
      - name: Build and push frontend
        run: |
          docker build -f frontend/Dockerfile -t $ECR_REGISTRY/rezovo/frontend:${{ github.sha }} -t $ECR_REGISTRY/rezovo/frontend:latest .
          docker push $ECR_REGISTRY/rezovo/frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/rezovo/frontend:latest

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GithubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy platform-api to ECS
        run: |
          aws ecs update-service \
            --cluster rezovo-cluster \
            --service rezovo-platform-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
      
      - name: Deploy realtime-core to ECS
        run: |
          aws ecs update-service \
            --cluster rezovo-cluster \
            --service rezovo-realtime-core \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
      
      - name: Deploy jobs worker to ECS
        run: |
          aws ecs update-service \
            --cluster rezovo-cluster \
            --service rezovo-jobs \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
      
      - name: Wait for deployment to complete
        run: |
          echo "Waiting for services to stabilize..."
          aws ecs wait services-stable \
            --cluster rezovo-cluster \
            --services rezovo-platform-api rezovo-realtime-core rezovo-jobs \
            --region ${{ env.AWS_REGION }}
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "Platform API: https://api.rezovo.ai/health"
          echo "Frontend: https://app.rezovo.ai"




